<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a3a;
    --text: #e8e8f0; --muted: #666680; --blue: #4f9cf9; --blue-dim: #1a3a6a;
    --cyan: #34d399; --cyan-dim: #0d3d2a; --orange: #fb923c; --orange-dim: #3d1f0d;
    --purple: #a78bfa; --purple-dim: #2d1a5a; --yellow: #fbbf24; --yellow-dim: #3d2d0d; --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 100px; }
  .header { padding: 20px 20px 0; position: sticky; top: 0; z-index: 50; background: var(--bg); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .header h1 { font-family: 'Space Mono', monospace; font-size: 26px; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; }
  .year-badge { background: var(--blue-dim); color: var(--blue); font-family: 'Space Mono', monospace; font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--blue); cursor: pointer; }
  .filter-bar { display: flex; gap: 8px; padding: 14px 20px; overflow-x: auto; scrollbar-width: none; }
  .filter-chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 13px; cursor: pointer; }
  .filter-chip.active { border-color: var(--blue); background: var(--blue-dim); color: var(--blue); }
  .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 4px; }
  .card { background: var(--surface); border-radius: 18px; padding: 16px; border: 1px solid var(--border); position: relative; overflow: hidden; }
  .card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; border-radius: 0 0 18px 18px; }
  .card.blue::after { background: var(--blue); } .card.cyan::after { background: var(--cyan); }
  .card.orange::after { background: var(--orange); } .card.purple::after { background: var(--purple); }
  .card-label { font-size: 10px; font-family: 'Space Mono', monospace; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .card-value { font-family: 'Space Mono', monospace; font-size: 26px; font-weight: 700; line-height: 1; }
  .card.blue .card-value { color: var(--blue); } .card.cyan .card-value { color: var(--cyan); }
  .card.orange .card-value { color: var(--orange); } .card.purple .card-value { color: var(--purple); }
  .section-title { padding: 18px 20px 10px; font-size: 11px; font-family: 'Space Mono', monospace; text-transform: uppercase; color: var(--muted); display: flex; justify-content: space-between; }
  .history-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
  .history-item { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); padding: 14px 16px; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding: 10px 0 20px; z-index: 100; }
  .nav-btn { flex: 1; background: none; border: none; color: var(--muted); font-size: 10px; display: flex; flex-direction: column; align-items: center; }
  .nav-btn.active { color: var(--blue); }
  .fab { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; border-radius: 18px; background: var(--blue); color: white; font-size: 26px; border: none; box-shadow: 0 4px 20px rgba(79,156,249,0.4); z-index: 90; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; max-height: 92vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.35s ease; }
  .modal-overlay.open .modal { transform: translateY(0); }
